apiVersion: v1
kind: Secret
metadata:
  name: stock-status-secrets
  namespace: stock-status
type: Opaque
stringData:
  # WICHTIG: In Production diese Werte durch echte Secrets ersetzen!
  # Verwenden Sie: kubectl create secret generic stock-status-secrets --from-literal=POSTGRES_PASSWORD=your-secure-password
  POSTGRES_PASSWORD: "changeme-in-production"
  SPRING_DATASOURCE_PASSWORD: "changeme-in-production"
