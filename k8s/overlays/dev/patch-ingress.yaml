apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-status-ingress
  namespace: stock-status-dev
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"  # Staging für Dev
spec:
  tls:
    - hosts:
        - dev.stock-status.example.com
      secretName: stock-status-dev-tls
  rules:
    - host: dev.stock-status.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
