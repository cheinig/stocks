apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: stock-status

bases:
  - ../../base

commonLabels:
  environment: production

images:
  - name: ghcr.io/your-username/stock-status-backend
    newTag: latest  # Oder spezifische Version wie v1.0.0
  - name: ghcr.io/your-username/stock-status-frontend
    newTag: latest

patchesStrategicMerge:
  - patch-configmap.yaml
  - patch-ingress.yaml

# Production-spezifische Resource Limits bereits in base definiert
