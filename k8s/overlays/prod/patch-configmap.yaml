apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-status-config
  namespace: stock-status
data:
  # Production-specific configuration
  ALLOWED_ORIGINS: "https://stock-status.example.com"
  LOGGING_LEVEL_ROOT: "INFO"
  LOGGING_LEVEL_COM_STOCKSTATUS: "INFO"
  JAVA_OPTS: "-Xmx1g -Xms512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
